<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dowód osobisty</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>

<body>
  <div class="app">
    <div class="id-card">
      <div class="header">
        <span>Rzeczpospolita Polska</span>
      </div>

      <div class="content">
        <div class="photo"></div>

        <div class="data">
          <p><strong>Imię:</strong> <span id="name">Jan</span></p>
          <p><strong>Nazwisko:</strong> <span id="surname">Kowalski</span></p>
          <p><strong>PESEL:</strong> <span id="pesel">00000000000</span></p>
          <p><strong>Data urodzenia:</strong> <span id="birth">01.01.2000</span></p>
        </div>
      </div>

      <div class="footer">
        <span>Dowód osobisty</span>
      </div>
    </div>

    <button id="editBtn">Edytuj dane</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
